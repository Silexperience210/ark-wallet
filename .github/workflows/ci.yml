name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Type-check frontend
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        working-directory: ./src-tauri
        run: cargo fmt -- --check

      - name: Lint Rust library
        working-directory: ./src-tauri
        run: cargo clippy --lib -- -D warnings

      - name: Check Rust library
        working-directory: ./src-tauri
        run: cargo check --lib

      - name: Run Rust tests
        working-directory: ./src-tauri
        run: cargo test --lib

  check-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check Rust library
        working-directory: ./src-tauri
        run: cargo check --lib

      - name: Run Rust tests
        working-directory: ./src-tauri
        run: cargo test --lib

  check-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check Rust library
        working-directory: ./src-tauri
        run: cargo check --lib

      - name: Run Rust tests
        working-directory: ./src-tauri
        run: cargo test --lib
