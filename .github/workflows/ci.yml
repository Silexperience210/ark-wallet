name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The shipping target is the Android APK (built on Linux by android.yml).
# CI validates the frontend + the Rust library on Linux host — the same
# `cargo check --lib` path used for local validation. Windows/macOS host
# builds hit intractable native-dep issues (vendored OpenSSL/libsodium) and
# are out of scope; add them back if a desktop build is targeted.
jobs:
  check-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install protoc + Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file
          echo "PROTOC=$(which protoc)" >> "$GITHUB_ENV"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Type-check frontend
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        working-directory: ./src-tauri
        run: cargo fmt -- --check

      - name: Lint Rust library
        working-directory: ./src-tauri
        run: cargo clippy --lib -- -D warnings

      - name: Check Rust library
        working-directory: ./src-tauri
        run: cargo check --lib

      - name: Run Rust tests
        working-directory: ./src-tauri
        run: cargo test --lib
